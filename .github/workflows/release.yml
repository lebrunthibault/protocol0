# Publishes a GitHub Release when a `v*` tag is pushed (Syncthing model: build in CI
# on tag, notes taken from the annotated tag message).
#
# The tag is created by the `/release` skill (never by `/commit`, which only bumps
# VERSION). This workflow neither bumps nor commits anything: it consumes the
# already-pushed tag, builds the installer with the same script as the local build
# (installer/windows/build_installer.ps1), and attaches the exe to the release.
#
# Sources: no need to upload a .zip — GitHub automatically attaches
# "Source code (zip/tar.gz)" to every release.

name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write       # créer la release + uploader les assets
  id-token: write       # OIDC pour attest-build-provenance (signature Sigstore)
  attestations: write   # écrire l'attestation de provenance du build

jobs:
  build-and-release:
    runs-on: windows-latest
    # Hoisted to job level so the VirusTotal step can gate on it in its `if`
    # (a secret cannot be read directly inside an `if` expression).
    env:
      VT_API_KEY: ${{ secrets.VT_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Node to build the Vue 3 SPA (src/frontend) — step 1/4 of build_installer.ps1,
      # embedded into the agent exe via rust-embed.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      # Rust (cargo) is preinstalled on the windows-latest image: it builds the native agent
      # exe (src/agent). Python (stdlib) above is enough to stage the remote script — no more
      # Poetry needed since the agent moved to Rust.

      - name: Install Inno Setup 6
        run: choco install innosetup -y --no-progress

      # Chains Vue 3 front (Vite) -> agent exe (Cargo/Rust) -> stage remote script -> ISCC.
      # Outputs dist-installer/Protocol0-Setup-<version>.exe.
      - name: Build installer
        run: pwsh installer/windows/build_installer.ps1

      # Safety net: fail explicitly if the exe was not produced, rather than
      # creating an empty release.
      - name: Verify installer artifact
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist-installer -Filter 'Protocol0-Setup-*.exe' -ErrorAction SilentlyContinue
          if (-not $exe) { throw "No installer produced in dist-installer/." }
          Write-Host "OK -> $($exe.FullName) ($([math]::Round($exe.Length/1MB,1)) MB)"

      # Checksum published next to the installer: the user verifies the download
      # with Get-FileHash and compares it to this file (cf. README anti-keylogger section).
      # Version-less filename -> a stable "SHA256SUMS" asset per release.
      - name: Generate SHA256SUMS
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist-installer -Filter 'Protocol0-Setup-*.exe' | Select-Object -First 1
          $hash = (Get-FileHash $exe.FullName -Algorithm SHA256).Hash.ToLower()
          # `sha256sum -c`-compatible format: "<hash>  <filename>".
          "$hash  $($exe.Name)" | Out-File -FilePath dist-installer/SHA256SUMS -Encoding ascii -NoNewline
          Write-Host "SHA256  $($exe.Name) = $hash"

      # Build provenance (Sigstore, free): verifiable proof that this exe was built
      # by this workflow from this commit. A certificate-free substitute for code
      # signing. User-side check: gh attestation verify <exe> -R lebrunthibault/protocol0.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: 'dist-installer/Protocol0-Setup-*.exe'

      # Notes = the tag's annotation message (the changelog /release put there).
      # We extract it explicitly rather than via --notes-from-tag: the latter falls
      # back to the pointed COMMIT's message when the annotated tag is pushed
      # separately, which would publish the wrong text. %(contents) gives the body
      # of the annotated tag deterministically. dist-installer/ is pristine in CI ->
      # the exe glob is unambiguous.
      - name: Create GitHub Release
        id: create_release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $exe = (Get-ChildItem dist-installer -Filter 'Protocol0-Setup-*.exe').FullName
          git tag -l "$env:GITHUB_REF_NAME" --format='%(contents)' | Out-File -FilePath notes.md -Encoding utf8
          gh release create "$env:GITHUB_REF_NAME" `
            --title "$env:GITHUB_REF_NAME" `
            --notes-file notes.md `
            "$exe" `
            "dist-installer/SHA256SUMS"
          # Expose the numeric release id so the VirusTotal step can patch the notes.
          # On a push:tags trigger there is no github.event.release.id, so we fetch it.
          $id = gh release view "$env:GITHUB_REF_NAME" --json databaseId --jq '.databaseId'
          "release_id=$id" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      # VirusTotal scan of the installer, link added to the release notes. Lets the
      # user see that any flag is a false positive (cf. README).
      # Requires the VT_API_KEY secret (free key: virustotal.com/gui/my-apikey).
      # Silent no-op if the secret is absent, so it never breaks the release.
      # Explicit release_id: this workflow triggers on push:tags (not the `release`
      # event), so the action has no github.event.release.id to patch the notes.
      - name: VirusTotal scan
        if: ${{ env.VT_API_KEY != '' }}
        uses: cssnr/virustotal-action@v2
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          file_globs: dist-installer/Protocol0-Setup-*.exe
          update_release: true
          release_id: ${{ steps.create_release.outputs.release_id }}
