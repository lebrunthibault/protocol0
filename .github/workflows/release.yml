# Publie une GitHub Release quand un tag `v*` est poussé (modèle Syncthing :
# build en CI sur tag, notes tirées du message du tag annoté).
#
# Le tag est créé par la skill `/release` (jamais par `/commit`, qui se contente
# de bumper VERSION). Ce workflow ne bumpe ni ne committe rien : il consomme le
# tag déjà poussé, build l'installeur via le même script que le build local
# (scripts/windows/build_installer.ps1), et attache l'exe à la release.
#
# Sources : pas besoin d'uploader un .zip — GitHub attache automatiquement
# « Source code (zip/tar.gz) » à chaque release.

name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write       # créer la release + uploader les assets
  id-token: write       # OIDC pour attest-build-provenance (signature Sigstore)
  attestations: write   # écrire l'attestation de provenance du build

jobs:
  build-and-release:
    runs-on: windows-latest
    # Hissé au niveau job pour que l'étape VirusTotal puisse se gater dessus dans son
    # `if` (un secret n'est pas lisible directement dans une expression `if`).
    env:
      VT_API_KEY: ${{ secrets.VT_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Node pour builder la SPA Vue 3 (src/frontend) — étape 1/4 de build_installer.ps1,
      # embarquée dans l'exe agent via PyInstaller datas.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install Poetry
        run: pip install poetry

      - name: Install Inno Setup 6
        run: choco install innosetup -y --no-progress

      # Enchaîne front Vue 3 (Vite) -> agent exe (PyInstaller) -> stage remote script -> ISCC.
      # Sort dist-installer/Protocol0-Setup-<version>.exe.
      - name: Build installer
        run: pwsh scripts/windows/build_installer.ps1

      # Filet de sécurité : échouer explicitement si l'exe n'a pas été produit,
      # plutôt que de créer une release vide.
      - name: Verify installer artifact
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist-installer -Filter 'Protocol0-Setup-*.exe' -ErrorAction SilentlyContinue
          if (-not $exe) { throw "Aucun installeur produit dans dist-installer/." }
          Write-Host "OK -> $($exe.FullName) ($([math]::Round($exe.Length/1MB,1)) MB)"

      # Checksum publié à côté de l'installeur : l'utilisateur vérifie le download
      # avec Get-FileHash et le compare à ce fichier (cf. section README anti-keylogger).
      # Nom de fichier sans version -> un asset stable "SHA256SUMS" par release.
      - name: Generate SHA256SUMS
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist-installer -Filter 'Protocol0-Setup-*.exe' | Select-Object -First 1
          $hash = (Get-FileHash $exe.FullName -Algorithm SHA256).Hash.ToLower()
          # Format compatible `sha256sum -c` : "<hash>  <filename>".
          "$hash  $($exe.Name)" | Out-File -FilePath dist-installer/SHA256SUMS -Encoding ascii -NoNewline
          Write-Host "SHA256  $($exe.Name) = $hash"

      # Provenance de build (Sigstore, gratuit) : preuve vérifiable que cet exe a été
      # buildé par ce workflow depuis ce commit. Substitut sans-certificat au code
      # signing. Vérif côté user : gh attestation verify <exe> -R lebrunthibault/protocol0.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: 'dist-installer/Protocol0-Setup-*.exe'

      # Notes = message d'annotation du tag (le changelog que /release y a mis).
      # On l'extrait explicitement plutôt que via --notes-from-tag : ce dernier
      # retombe sur le message du COMMIT pointé quand le tag annoté est poussé
      # séparément, ce qui publierait le mauvais texte. %(contents) donne le corps
      # du tag annoté de façon déterministe. dist-installer/ est vierge en CI ->
      # le glob de l'exe est sans ambiguïté.
      - name: Create GitHub Release
        id: create_release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $exe = (Get-ChildItem dist-installer -Filter 'Protocol0-Setup-*.exe').FullName
          git tag -l "$env:GITHUB_REF_NAME" --format='%(contents)' | Out-File -FilePath notes.md -Encoding utf8
          gh release create "$env:GITHUB_REF_NAME" `
            --title "$env:GITHUB_REF_NAME" `
            --notes-file notes.md `
            "$exe" `
            "dist-installer/SHA256SUMS"
          # Expose the numeric release id so the VirusTotal step can patch the notes.
          # On a push:tags trigger there is no github.event.release.id, so we fetch it.
          $id = gh release view "$env:GITHUB_REF_NAME" --json databaseId --jq '.databaseId'
          "release_id=$id" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      # Scan VirusTotal de l'installeur, lien ajouté aux notes de release. Permet à
      # l'utilisateur de constater qu'un éventuel flag est un faux positif (cf. README).
      # Nécessite le secret VT_API_KEY (clé gratuite : virustotal.com/gui/my-apikey).
      # No-op silencieux si le secret est absent, pour ne pas casser la release.
      # release_id explicite : ce workflow se déclenche sur push:tags (pas sur l'event
      # `release`), donc l'action n'a pas github.event.release.id pour patcher les notes.
      - name: VirusTotal scan
        if: ${{ env.VT_API_KEY != '' }}
        uses: cssnr/virustotal-action@v2
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          file_globs: dist-installer/Protocol0-Setup-*.exe
          update_release: true
          release_id: ${{ steps.create_release.outputs.release_id }}
